<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo 앱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app">
        <h1 class="app-title">✅ Todo</h1>

        <!-- 입력 영역 -->
        <form class="input-area" id="todoForm">
            <div class="input-row">
                <input
                    type="text"
                    id="todoInput"
                    class="todo-input"
                    placeholder="할 일을 입력하세요..."
                    autocomplete="off"
                >
                <button type="submit" class="btn-add">추가</button>
            </div>
            <div class="date-row">
                <label class="date-label" for="dueDateInput">📅 마감일 (선택)</label>
                <input type="date" id="dueDateInput" class="due-date-input">
            </div>
        </form>

        <!-- 필터 탭 -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행중</button>
            <button class="filter-btn" data-filter="done">완료</button>
        </div>

        <!-- 할 일 목록 -->
        <ul class="todo-list" id="todoList">
            <!-- JavaScript로 생성됩니다 -->
        </ul>

        <!-- 하단 통계 -->
        <div class="footer" id="todoFooter">
            <span id="countText">0개 남음</span>
            <button class="btn-clear" id="clearDone">완료 항목 삭제</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
