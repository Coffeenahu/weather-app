<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="간단한 모바일 메모장 PWA">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="메모장">

    <title>메모장</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">

        <!-- 목록 뷰 -->
        <div id="list-view">
            <header class="app-header">
                <h1 class="app-title">📝 메모장</h1>
                <input
                    type="search"
                    id="search-input"
                    class="search-input"
                    placeholder="검색..."
                    autocomplete="off"
                    aria-label="메모 검색"
                >
            </header>
            <div id="notes-container" class="notes-container"></div>
            <button id="fab" class="fab" aria-label="새 메모 작성">＋</button>
        </div>

        <!-- 편집 뷰 -->
        <div id="edit-view" hidden>
            <header class="edit-header">
                <button id="btn-back" class="btn-icon" aria-label="뒤로">&#8592;</button>
                <div class="edit-actions">
                    <button id="btn-delete" class="btn-delete" hidden aria-label="삭제">삭제</button>
                    <button id="btn-save" class="btn-save" aria-label="저장">저장</button>
                </div>
            </header>
            <input
                type="text"
                id="edit-title"
                class="edit-title-input"
                placeholder="제목"
                aria-label="메모 제목"
            >
            <textarea
                id="edit-body"
                class="edit-body-input"
                placeholder="메모를 입력하세요..."
                aria-label="메모 내용"
            ></textarea>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
